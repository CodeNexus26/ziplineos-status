<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZiplineOS Status</title>
    <meta name="description" content="Live and historical uptime for the ZiplineOS platform and portals. Monitoring runs independently of our own systems to keep this status accurate and available." />
    <meta property="og:title" content="ZiplineOS Status" />
    <meta property="og:description" content="Live uptime for the ZiplineOS platform and portals." />
    <meta name="theme-color" content="#0A0F1E" />
    <!-- Favicons. Replace files in public/ at the same filenames to update. -->
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;600;700;800&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --color-canvas: #0A0F1E;
            --color-surface: #111827;
            --color-surface-hover: #1E293B;
            --color-text-primary: #F1F5F9;
            --color-text-secondary: #94A3B8;
            --color-text-muted: #64748B;
            --color-accent-cyan: #06B6D4;
            --color-accent-violet: #8B5CF6;
            --color-up: #22C55E;
            --color-mild: #FACC15;
            --color-degraded: #F59E0B;
            --color-down: #F43F5E;
            --color-no-data: rgba(148, 163, 184, 0.18);
            --color-border: rgba(255, 255, 255, 0.08);
            --color-border-hover: rgba(255, 255, 255, 0.15);
            --brand-gradient: linear-gradient(45deg, #8B5CF6 0%, #4989E5 66%, #06B6D4 100%);
            --hero-gradient: linear-gradient(135deg, #0A0F1E 0%, #0F172A 50%, #1E1B4B 100%);
            --font-heading: "Outfit", system-ui, -apple-system, sans-serif;
            --font-body: "Work Sans", system-ui, -apple-system, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--color-canvas);
            color: var(--color-text-primary);
            font-family: var(--font-body);
            min-height: 100vh;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: var(--hero-gradient);
            z-index: -2;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(148, 163, 184, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
            z-index: -1;
            pointer-events: none;
        }

        ::selection { background: rgba(6, 182, 212, 0.25); color: #F1F5F9; }

        h1, h2, h3, h4 {
            font-family: var(--font-heading);
            color: var(--color-text-primary);
            text-wrap: balance;
            letter-spacing: -0.01em;
            font-weight: 700;
        }

        a {
            color: var(--color-accent-cyan);
            text-decoration: none;
            transition: color 0.2s ease;
        }
        a:hover { color: #22D3EE; }

        /* ---- Navbar — matches marketing site Navbar.tsx ---- */
        nav {
            position: sticky;
            top: 0;
            inset-inline: 0;
            height: 80px;
            z-index: 100;
            background-color: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }
        .nav-inner {
            position: relative;
            max-width: 80rem;
            margin: 0 auto;
            padding: 0 24px;
            height: 100%;
        }
        .logo-link {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            height: 32px;
            display: inline-flex;
            align-items: center;
            gap: 8px; /* gap-2 — matches Logo.tsx in marketing site */
            text-decoration: none;
            line-height: 1;
        }
        .logo-link:hover,
        .logo-link:focus,
        .logo-link:active {
            color: var(--color-text-primary);
            opacity: 1;
            text-decoration: none;
        }
        .logo-mark {
            height: 100%;
            width: auto;
            user-select: none;
            -webkit-user-drag: none;
            pointer-events: none;
        }
        .logo-wordmark {
            height: 80%;
            width: auto;
            display: block;
            pointer-events: none;
        }

        /* ---- Notices / notifications — sits between the hero and the monitors ---- */
        .notices {
            max-width: 1200px;
            margin: 0 auto;
            padding: 8px 24px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .notice {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 12px;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--color-border);
        }
        .notice--maintenance {
            border-color: rgba(245, 158, 11, 0.35);
            background: rgba(245, 158, 11, 0.08);
        }
        .notice-icon {
            flex: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 9999px;
            background: rgba(245, 158, 11, 0.15);
            color: var(--color-degraded);
        }
        .notice-icon svg {
            width: 20px;
            height: 20px;
        }
        .notice-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }
        .notice-title {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 15px;
            color: var(--color-text-primary);
        }
        .notice-text {
            color: var(--color-text-secondary);
            font-size: 14px;
            line-height: 1.55;
            max-width: 70ch;
        }

        /* ---- Hero ---- */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px 32px;
        }
        .status-banner {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-radius: 9999px;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--color-border);
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .status-banner.up { color: var(--color-up); }
        .status-banner.degraded { color: var(--color-degraded); }
        .status-banner.down { color: var(--color-down); }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 12px currentColor;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.85); }
        }
        .hero h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            margin-bottom: 16px;
        }
        .hero p {
            color: var(--color-text-secondary);
            font-size: 1.125rem;
            max-width: 65ch;
            line-height: 1.6;
        }

        /* ---- Section header — "Uptime over the past 90 days" ---- */
        .section-head {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 16px;
            display: flex;
            align-items: baseline;
            justify-content: flex-end;
            color: var(--color-text-muted);
            font-size: 13px;
            font-family: var(--font-heading);
        }
        .section-head strong {
            color: var(--color-text-secondary);
            font-weight: 600;
        }

        /* ---- Status rows ---- */
        .rows {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 80px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .row {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 20px 24px;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }
        .row:hover {
            border-color: var(--color-border-hover);
            box-shadow:
                0 20px 40px -15px rgba(0, 0, 0, 0.5),
                0 0 60px -20px rgba(6, 182, 212, 0.12);
        }

        .row-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 14px;
        }
        .row-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: var(--font-heading);
            font-size: 1.0625rem;
            font-weight: 600;
            color: var(--color-text-primary);
        }
        .row-name img {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            opacity: 0.9;
        }
        .row-name small {
            color: var(--color-text-muted);
            font-weight: 500;
            font-family: var(--font-body);
        }
        .row-status {
            font-family: var(--font-heading);
            font-weight: 600;
            font-size: 14px;
        }
        .row-status.up { color: var(--color-up); }
        .row-status.degraded { color: var(--color-degraded); }
        .row-status.down { color: var(--color-down); }

        /* ---- Bar chart ---- */
        .bars {
            display: flex;
            gap: 2px;
            align-items: stretch;
            height: 36px;
        }
        .bars-day {
            flex: 1 1 0;
            min-width: 0;
            border-radius: 2px;
            transition: transform 0.15s ease, filter 0.15s ease;
            position: relative;
        }
        .bars-day:hover {
            transform: scaleY(1.08);
            filter: brightness(1.25);
        }
        .bars-day.up { background: var(--color-up); }
        .bars-day.mild { background: var(--color-mild); }
        .bars-day.degraded { background: var(--color-degraded); }
        .bars-day.down { background: var(--color-down); }
        .bars-day.no-data { background: var(--color-no-data); }

        /* Tooltip via title attr — keep CSS only, no JS popovers needed.
           Modern browsers render the title attribute natively on hover. */

        .row-foot {
            margin-top: 10px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 12px;
            color: var(--color-text-muted);
            font-size: 12px;
            font-family: var(--font-heading);
        }
        .row-foot .axis-label {
            color: var(--color-text-muted);
        }
        .row-foot .axis-rule {
            height: 1px;
            background: var(--color-border);
        }
        .row-foot .pct {
            text-align: center;
            color: var(--color-text-secondary);
            font-weight: 600;
            white-space: nowrap;
        }
        .row-foot .right {
            text-align: right;
        }
        .row-foot .axis-with-rule {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .row-foot .axis-with-rule.left { justify-content: flex-start; }
        .row-foot .axis-with-rule.right { justify-content: flex-end; }
        .row-foot .axis-with-rule .axis-rule { flex: 1; }

        /* ---- Loader / error ---- */
        .loader, .error {
            background: rgba(17, 24, 39, 0.5);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            color: var(--color-text-muted);
            font-family: var(--font-heading);
        }
        .loader-spinner {
            width: 32px;
            height: 32px;
            margin: 0 auto;
            border: 2px solid rgba(6, 182, 212, 0.2);
            border-top-color: var(--color-accent-cyan);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error {
            background: rgba(244, 63, 94, 0.08);
            border-color: rgba(244, 63, 94, 0.25);
            color: #FCA5A5;
        }

        /* ---- Footer ---- */
        footer {
            position: relative;
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--color-border);
            padding: 32px 24px;
            text-align: center;
            color: var(--color-text-muted);
            font-size: 14px;
            margin-top: 40px;
        }
        footer::before {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            top: -1px;
            height: 1px;
            background: var(--brand-gradient);
            opacity: 0.3;
        }
        footer a { color: var(--color-text-secondary); }
        footer a:hover { color: var(--color-accent-cyan); }
        .last-updated {
            display: block;
            margin-top: 8px;
            color: var(--color-text-muted);
            font-size: 12px;
        }

        /* ---- Mobile: collapse bar width but keep readability ---- */
        @media (max-width: 640px) {
            .bars { gap: 1px; height: 30px; }
            .row { padding: 16px; }
            .row-name { font-size: 1rem; }
            .row-foot { font-size: 11px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <!-- Auto-unregister stale Upptime service worker / cached pages -->
    <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then((regs) => {
                for (const reg of regs) reg.unregister();
            }).catch(() => { });
        }
        if ("caches" in window) {
            caches.keys().then((keys) => {
                for (const k of keys) caches.delete(k);
            }).catch(() => { });
        }
    </script>

    <nav aria-label="Main navigation">
        <div class="nav-inner">
            <a class="logo-link" href="https://ziplineos.com.au" aria-label="Back to ZiplineOS">
                <img class="logo-mark" src="/ziplineos_logo.png" alt="" aria-hidden="true" draggable="false" />
                <svg class="logo-wordmark" viewBox="0 0 155 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ZiplineOS">
                    <defs>
                        <linearGradient id="logo-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#8B5CF6" />
                            <stop offset="66%" stop-color="#4989E5" />
                            <stop offset="100%" stop-color="#06B6D4" />
                        </linearGradient>
                    </defs>
                    <text x="0" y="24" font-family="Outfit, system-ui, sans-serif" font-size="26" font-weight="700" letter-spacing="-0.02em">
                        <tspan fill="#F1F5F9">Zipline</tspan><tspan fill="url(#logo-gradient)">OS</tspan>
                    </text>
                </svg>
            </a>
        </div>
    </nav>

    <header class="hero">
        <div id="status-banner" class="status-banner up" role="status">
            <span class="status-dot"></span>
            <span id="status-banner-text">Checking status…</span>
        </div>
        <h1>ZiplineOS System Status</h1>
        <p>Live and historical uptime for the ZiplineOS platform and portals. Monitoring runs independently of our own systems, so this page stays accurate and available even during an outage.</p>
    </header>
       <div class="section-head">

    <div class="section-head">
        <span>Uptime over the past <strong>90 days</strong>.</span>
    </div>

    <main class="rows" id="rows" aria-live="polite">
        <div class="loader">
            <div class="loader-spinner" aria-label="Loading status"></div>
        </div>
    </main>

    <footer>
        <div>
            Powered by <a href="https://upptime.js.org" rel="noopener">Upptime</a>
        </div>
        <span class="last-updated" id="last-updated"></span>
    </footer>

    <script>
        (() => {
            const SUMMARY_URL = "https://raw.githubusercontent.com/CodeNexus26/ziplineos-status/master/history/summary.json";
            const REFRESH_MS = 60_000;
            const DAYS_WINDOW = 90;
            const MINUTES_PER_DAY = 24 * 60;

            // Thresholds (minutes down per day) for bar color.
            const T_MILD = 5;     // any blip
            const T_DEGRADED = 60; // sustained issue
            const T_DOWN = 240;    // major

            const rowsEl = document.getElementById("rows");
            const bannerEl = document.getElementById("status-banner");
            const bannerTextEl = document.getElementById("status-banner-text");
            const lastUpdatedEl = document.getElementById("last-updated");

            const fmtDate = (d) => {
                const y = d.getUTCFullYear();
                const m = String(d.getUTCMonth() + 1).padStart(2, "0");
                const dd = String(d.getUTCDate()).padStart(2, "0");
                return `${y}-${m}-${dd}`;
            };

            const fmtDisplayDate = (d) => d.toLocaleDateString(undefined, {
                year: "numeric", month: "short", day: "numeric",
            });

            const fmtUptime = (str) => (str ?? "—");

            const dayClass = (minDown) => {
                if (minDown <= 0) return "up";
                if (minDown < T_MILD) return "up";
                if (minDown < T_DEGRADED) return "mild";
                if (minDown < T_DOWN) return "degraded";
                return "down";
            };

            const buildBars = (site) => {
                const today = new Date();
                today.setUTCHours(0, 0, 0, 0);
                const minDownMap = site.dailyMinutesDown || {};

                let totalMin = 0;
                let downMin = 0;
                const bars = [];
                for (let i = DAYS_WINDOW - 1; i >= 0; i--) {
                    const d = new Date(today);
                    d.setUTCDate(today.getUTCDate() - i);
                    const key = fmtDate(d);
                    const minDown = minDownMap[key] || 0;
                    totalMin += MINUTES_PER_DAY;
                    downMin += minDown;
                    const cls = dayClass(minDown);
                    const upPct = ((MINUTES_PER_DAY - minDown) / MINUTES_PER_DAY) * 100;
                    const title = minDown > 0
                        ? `${fmtDisplayDate(d)} · ${upPct.toFixed(2)}% uptime · ${minDown} min down`
                        : `${fmtDisplayDate(d)} · 100% uptime`;
                    bars.push(`<div class="bars-day ${cls}" title="${title}" role="img" aria-label="${title}"></div>`);
                }
                const upPct90 = ((totalMin - downMin) / totalMin) * 100;
                return { bars: bars.join(""), upPct90 };
            };

            const render = (sites) => {
                if (!sites?.length) {
                    rowsEl.innerHTML = `<div class="error">No sites configured.</div>`;
                    return;
                }

                let downCount = 0;
                let degradedCount = 0;

                const html = sites.map((s) => {
                    const status = (s.status || "up").toLowerCase();
                    if (status === "down") downCount++;
                    else if (status !== "up") degradedCount++;
                    const statusLabel = status === "up" ? "Operational" : status === "down" ? "Down" : status.charAt(0).toUpperCase() + status.slice(1);
                    const icon = s.icon ? `<img src="${s.icon}" alt="" onerror="this.style.display='none'" />` : "";
                    const { bars, upPct90 } = buildBars(s);
                    const host = (() => { try { return new URL(s.url).host; } catch { return s.url; } })();
                    return `
                        <article class="row" data-status="${status}">
                            <div class="row-head">
                                <div class="row-name">${icon}<span>${s.name}</span><small>· ${host}</small></div>
                                <div class="row-status ${status}">${statusLabel}</div>
                            </div>
                            <div class="bars" role="img" aria-label="${s.name} uptime over the past ${DAYS_WINDOW} days">
                                ${bars}
                            </div>
                            <div class="row-foot">
                                <div class="axis-with-rule left">
                                    <span class="axis-label">${DAYS_WINDOW} days ago</span>
                                    <span class="axis-rule"></span>
                                </div>
                                <div class="pct">${upPct90.toFixed(2)}% uptime</div>
                                <div class="axis-with-rule right">
                                    <span class="axis-rule"></span>
                                    <span class="axis-label">Today</span>
                                </div>
                            </div>
                        </article>
                    `;
                }).join("");
                rowsEl.innerHTML = html;

                if (downCount > 0) {
                    bannerEl.className = "status-banner down";
                    bannerTextEl.textContent = `${downCount} ${downCount === 1 ? "service is" : "services are"} down`;
                } else if (degradedCount > 0) {
                    bannerEl.className = "status-banner degraded";
                    bannerTextEl.textContent = `${degradedCount} ${degradedCount === 1 ? "service is" : "services are"} degraded`;
                } else {
                    bannerEl.className = "status-banner up";
                    bannerTextEl.textContent = "All systems operational";
                }
            };

            const renderError = (err) => {
                rowsEl.innerHTML = `<div class="error">Couldn't load status data — ${err}</div>`;
                bannerEl.className = "status-banner degraded";
                bannerTextEl.textContent = "Status data unavailable";
            };

            const fetchSummary = async () => {
                try {
                    const url = `${SUMMARY_URL}?t=${Date.now()}`;
                    const res = await fetch(url, { cache: "no-store" });
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    render(data);
                    lastUpdatedEl.textContent = `Last refreshed ${new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" })}`;
                } catch (err) {
                    renderError(err.message || err);
                }
            };

            fetchSummary();
            setInterval(fetchSummary, REFRESH_MS);
        })();
    </script>
</body>

</html>
